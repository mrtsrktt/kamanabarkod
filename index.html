<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamana Pasta Kafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF6EF;
      --brown: #3B2A1A;
      --gold: #C4953A;
      --warm-gray: #8C7B6B;
      --card-bg: #FFFDF9;
    }

    body {
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(196,149,58,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(59,42,26,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      border-radius: 4px;
      padding: 52px 36px 44px;
      box-shadow: 0 2px 8px rgba(59,42,26,0.06), 0 16px 48px rgba(59,42,26,0.10);
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament {
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .logo-area h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: var(--brown);
      letter-spacing: 3px;
      line-height: 1.1;
    }

    .logo-area h1 span {
      display: block;
      font-size: 12px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 7px;
      color: var(--warm-gray);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
    }
    .divider::before { background: linear-gradient(90deg, transparent, rgba(196,149,58,0.4)); }
    .divider::after  { background: linear-gradient(270deg, transparent, rgba(196,149,58,0.4)); }
    .divider span { color: var(--gold); font-size: 10px; opacity: 0.7; }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--warm-gray);
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 3px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      transition: all 0.25s ease;
      border: 1px solid;
    }

    .link-btn:hover { transform: translateY(-1px); opacity: 0.88; }
    .link-btn:active { transform: translateY(0); }

    .btn-instagram { background: transparent; color: var(--brown); border-color: rgba(59,42,26,0.2); }
    .btn-instagram:hover { border-color: var(--brown); }

    .btn-whatsapp { background: var(--brown); color: var(--cream); border-color: var(--brown); }

    .btn-phone { background: transparent; color: var(--brown); border-color: rgba(59,42,26,0.2); }
    .btn-phone:hover { border-color: var(--brown); }

    .btn-location { background: transparent; color: var(--gold); border-color: rgba(196,149,58,0.35); }
    .btn-location:hover { border-color: var(--gold); }

    .btn-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-icon svg { width: 17px; height: 17px; fill: currentColor; }
    .btn-label { flex: 1; text-align: left; text-transform: uppercase; }
    .btn-arrow { opacity: 0.35; font-size: 11px; transition: transform 0.2s; }
    .link-btn:hover .btn-arrow { transform: translateX(3px); opacity: 0.7; }

    .footer-note {
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--warm-gray);
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>
