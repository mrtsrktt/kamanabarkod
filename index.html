<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamana Pasta Kafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF6EF;
      --brown: #3B2A1A;
      --gold: #C4953A;
      --gold-light: #E8C97A;
      --warm-gray: #8C7B6B;
      --card-bg: #FFFDF9;
    }

    body {
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(196,149,58,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(59,42,26,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      border-radius: 4px;
      padding: 52px 36px 44px;
      box-shadow:
        0 2px 8px rgba(59,42,26,0.06),
        0 16px 48px rgba(59,42,26,0.10);
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .logo-area {
      margin-bottom: 8px;
    }

    .logo-area h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .logo-area .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,149,58,0.4));
    }
    .divider::after {
      background: linear-gradient(90deg, rgba(196,149,58,0.4), transparent);
    }

    .divider span {
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59,42,26,0.12);
    }

    .link-btn .icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-btn .icon svg {
      width: 18px;
      height: 18px;
    }

    .link-btn .text {
      text-align: left;
    }

    .link-btn .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .link-btn .value {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    /* Instagram */
    .btn-instagram {
      background: #fff8f3;
      border-color: rgba(196,149,58,0.2);
      color: var(--brown);
    }
    .btn-instagram .icon {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }
    .btn-instagram:hover { border-color: rgba(220,39,67,0.3); }

    /* WhatsApp */
    .btn-whatsapp {
      background: #f3faf4;
      border-color: rgba(37,211,102,0.2);
      color: var(--brown);
    }
    .btn-whatsapp .icon { background: #25D366; }
    .btn-whatsapp:hover { border-color: rgba(37,211,102,0.4); }

    /* Telefon */
    .btn-phone {
      background: #f5f3ff;
      border-color: rgba(99,102,241,0.2);
      color: var(--brown);
    }
    .btn-phone .icon { background: var(--brown); }
    .btn-phone:hover { border-color: rgba(59,42,26,0.3); }

    /* Konum */
    .btn-location {
      background: #fff5f5;
      border-color: rgba(239,68,68,0.2);
      color: var(--brown);
    }
    .btn-location .icon { background: #EA4335; }
    .btn-location:hover { border-color: rgba(234,67,53,0.3); }

    .footer {
      margin-top: 32px;
      font-size: 0.72rem;
      color: var(--warm-gray);
      letter-spacing: 0.08em;
      line-height: 1.6;
    }
  </style>
</head>
